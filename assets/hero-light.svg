<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 420" width="1200" height="420" role="img" aria-label="shiploop — the self-improving harness that ships your backlog">
  <style>
    .bg    { fill: #faf9f7; stroke: #e8e6e1; stroke-width: 1.5; }
    .card  { fill: #ffffff; stroke: #e3e1db; stroke-width: 1.25; }
    .word  { font: 800 76px ui-sans-serif, -apple-system, "Segoe UI", Helvetica, Arial, sans-serif; fill: #1f1e1d; letter-spacing: -2px; }
    .tag   { font: 400 19px ui-sans-serif, -apple-system, "Segoe UI", Helvetica, Arial, sans-serif; fill: #55544f; }
    .lbl   { font: 500 12px ui-sans-serif, -apple-system, "Segoe UI", Helvetica, Arial, sans-serif; fill: #55544f; }
    .mlbl  { font: 500 11.5px ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; fill: #55544f; }
    .accent { fill: #2a78d6; }
    .wire  { fill: none; stroke-width: 1.5; opacity: 0.45; }
    .icon  { fill: none; stroke-width: 2.2; stroke-linecap: round; stroke-linejoin: round; }
  </style>
  <defs>
    <marker id="ra" viewBox="0 0 4 4" refX="2.6" refY="2" markerWidth="4" markerHeight="4" orient="auto-start-reverse">
      <path d="M0 0 L4 2 L0 4 Z" fill="#2a78d6"/>
    </marker>
  </defs>

  <rect class="bg" x="1" y="1" width="1198" height="418" rx="18"/>

  <!-- wires -->
  <path class="wire" stroke="#4a3aa7" d="M218 106 C330 106 380 150 460 176"/>
  <circle cx="341" cy="115" r="3.5" fill="#4a3aa7"/>
  <path class="wire" stroke="#2a78d6" d="M154 216 C300 216 350 228 415 233"/>
  <circle cx="330" cy="220" r="3.5" fill="#2a78d6"/>
  <path class="wire" stroke="#1baf7a" d="M238 320 C350 320 400 322 480 318"/>
  <circle cx="355" cy="320" r="3.5" fill="#1baf7a"/>
  <path class="wire" stroke="#eb6834" d="M982 106 C870 106 820 150 740 176"/>
  <circle cx="859" cy="115" r="3.5" fill="#eb6834"/>
  <path class="wire" stroke="#0ca30c" d="M1046 216 C900 216 850 228 790 233"/>
  <circle cx="870" cy="220" r="3.5" fill="#0ca30c"/>
  <path class="wire" stroke="#2a78d6" d="M962 320 C850 320 800 322 720 318"/>
  <circle cx="845" cy="320" r="3.5" fill="#2a78d6"/>

  <!-- center mark: loop ring -->
  <path d="M611.6 86.1 A34 34 0 1 1 568.1 129.6" fill="none" stroke="#2a78d6" stroke-width="7" stroke-linecap="round" marker-end="url(#ra)"/>

  <!-- wordmark + tagline -->
  <text class="word" x="600" y="262" text-anchor="middle">ship<tspan class="accent">loop</tspan></text>
  <text class="tag" x="600" y="304" text-anchor="middle">the self-improving harness that ships your backlog</text>

  <!-- left satellites -->
  <rect class="card" x="150" y="72" width="68" height="68" rx="14"/>
  <g class="icon" stroke="#4a3aa7">
    <rect x="173" y="92" width="22" height="28" rx="3"/>
    <path d="M178 100 H190 M178 106 H190 M178 112 H186"/>
  </g>
  <text class="lbl" x="184" y="158" text-anchor="middle">specs</text>

  <rect class="card" x="86" y="182" width="68" height="68" rx="14"/>
  <g class="icon" stroke="#2a78d6">
    <circle cx="111" cy="208" r="1.6" fill="#2a78d6"/>
    <circle cx="111" cy="216" r="1.6" fill="#2a78d6"/>
    <circle cx="111" cy="224" r="1.6" fill="#2a78d6"/>
    <path d="M117 208 H130 M117 216 H130 M117 224 H126"/>
  </g>
  <text class="lbl" x="120" y="268" text-anchor="middle">tickets</text>

  <rect class="card" x="170" y="286" width="68" height="68" rx="14"/>
  <g class="icon" stroke="#1baf7a">
    <circle cx="198" cy="311" r="4"/>
    <circle cx="198" cy="329" r="4"/>
    <circle cx="212" cy="311" r="4"/>
    <path d="M198 315 V325 M212 315 C212 322 198 318 198 322"/>
  </g>
  <text class="lbl" x="204" y="372" text-anchor="middle">worktrees</text>

  <!-- right satellites -->
  <rect class="card" x="982" y="72" width="68" height="68" rx="14"/>
  <g class="icon" stroke="#eb6834">
    <circle cx="1009" cy="97" r="4"/>
    <circle cx="1009" cy="115" r="4"/>
    <circle cx="1023" cy="115" r="4"/>
    <path d="M1009 101 V111 M1014 97 H1017 Q1023 97 1023 103 V111"/>
  </g>
  <text class="lbl" x="1016" y="158" text-anchor="middle">auto-merge</text>

  <rect class="card" x="1046" y="182" width="68" height="68" rx="14"/>
  <g class="icon" stroke="#0ca30c">
    <circle cx="1080" cy="216" r="11"/>
    <path d="M1075 216 L1079 220 L1086 212"/>
  </g>
  <text class="lbl" x="1080" y="268" text-anchor="middle">green CI</text>

  <rect class="card" x="962" y="286" width="68" height="68" rx="14"/>
  <g class="icon" stroke="#2a78d6">
    <path d="M986 307 H999 L1006 314 V333 H986 Z M999 307 V314 H1006"/>
  </g>
  <text class="mlbl" x="996" y="372" text-anchor="middle">CLAUDE.md</text>
</svg>
